name: Demo 05 - Push To Main

on:
  workflow_dispatch:
  push:
    branches: 
      - main
permissions:
  contents: read
  checks: write

jobs:
  build-app:
    name: "Build App"
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      
    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    
    - name: Install dependencies
      run: dotnet restore "${{ github.workspace }}/mywebapp/mywebapp.sln"
    
    - name: Build
      run: dotnet build "${{ github.workspace }}/mywebapp/mywebapp.sln" --configuration Release --no-restore
    
    - name: Test
      run: |
        dotnet test "${{ github.workspace }}/mywebapp/mywebapp.sln" --no-restore --verbosity normal --logger "trx;LogFileName=test-results.trx"

    - name: Test Report
      uses: dorny/test-reporter@v1.9.1
      if: success() || failure()
      with:
        name: XUnit Tests
        path: "**/test-results.trx"
        reporter: dotnet-trx
      
    - name: Publish
      run: dotnet publish "${{ github.workspace }}/mywebapp/src/mywebapp.csproj" -c Release -o "${{ github.workspace }}/final_output"
    
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ase-build-artifacts
        path: "${{ github.workspace }}/final_output/"
        if-no-files-found: error
        retention-days: 7

  deploy-DEV:
    name: "Deploy To DEV"
    runs-on: ubuntu-latest
    needs: build-app
    environment:
      name: 'DEV'
      url: 'https://ase-537861-dev-hrbwb7g2f4dvbye5.uaenorth-01.azurewebsites.net'

    steps:
    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Download Artifact
      uses: actions/download-artifact@v4
      with:
        name: 'ase-build-artifacts'
        path: 'publish_temp'
   
    - name: Deploy to Azure Web App (DEV)
      uses: azure/webapps-deploy@v3
      with: 
        app-name: 'ase-537861'
        slot-name: 'dev'
        package: 'publish_temp'

  deploy-QA:
    name: "Deploy To QA"
    runs-on: ubuntu-latest
    needs: build-app
    environment:
      name: 'QA'
      url: 'https://ase-537861-qa-cca4h5drd6g8h3cr.uaenorth-01.azurewebsites.net'

    steps:
    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Download Artifact
      uses: actions/download-artifact@v4
      with:
        name: 'ase-build-artifacts'
        path: 'publish_temp'
   
    - name: Deploy to Azure Web App (QA)
      uses: azure/webapps-deploy@v3
      with: 
        app-name: 'ase-537861'
        slot-name: 'qa'
        package: 'publish_temp'

  deploy-PROD:
    name: "Deploy To PROD"
    runs-on: ubuntu-latest
    needs: [deploy-DEV, deploy-QA]
    environment:
      name: 'PROD'
      url: 'https://ase-537861-djabbggzg3f4fge7.uaenorth-01.azurewebsites.net'

    steps:
    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Download Artifact
      uses: actions/download-artifact@v4
      with:
        name: 'ase-build-artifacts'
        path: 'publish_temp'
   
    - name: Deploy to Azure Web App (PROD)
      uses: azure/webapps-deploy@v3
      with: 
        app-name: 'ase-537861'
        package: 'publish_temp'
