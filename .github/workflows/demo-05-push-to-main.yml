name: Demo 05 - Push To Main

on:
  workflow_dispatch:
  push:
    branches: 
      - main
  
jobs:
  build-app:
    name: "Build App"

    runs-on: ubuntu-latest

    permissions:
      checks: write
    steps:
    - uses: actions/checkout@v4
      
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x
    
    - name: Install dependencies
      run: dotnet restore "${{ github.workspace }}/mywebapp/mywebapp.sln"
    
    - name: Build
      run: dotnet build "${{ github.workspace }}/mywebapp/mywebapp.sln" --configuration Release --no-restore
    
    - name: Test
      run: |
        dotnet test "${{ github.workspace }}/mywebapp/mywebapp.sln" --no-restore --verbosity normal  --logger "trx;LogFileName=test-results.trx"

    - name: Test Report
      uses: dorny/test-reporter@v1.6.0
      if: success() || failure()    # run this step even if previous step failed
      with:
        name: XUnit Tests            # Name of the check run which will be created
        path: ${{ github.workspace }}/mywebapp/tests/TestResults/*.trx    # Path to test results
        reporter: dotnet-trx
      
    - name: Publish
      run: |
        dotnet publish "${{ github.workspace }}/mywebapp/mywebapp.sln" -c Release -o mywebapp
    
    - name: Upload a Build Artifact
      uses: actions/upload-artifact@v4
      with:
        # Artifact name
        name: mywebappbuildartifacts
        # A file, directory or wildcard pattern that describes what to upload
        path: mywebapp/**
        # The desired behavior if no files are found using the provided path.
        if-no-files-found: error
        # Duration after which artifact will expire in days. 0 means using default retention.
        retention-days: 90


  deploy-DEV:
    name: "Deploy To Azure DEV env"

    runs-on: ubuntu-latest
    
    needs:
      - build-app
    
    environment:
      name: 'DEMO05_DEV'
      url: 'https://mywebapp-actions-dev.azurewebsites.net'

    steps:
    - uses: actions/checkout@v4
      
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x

    - name: 'Login via Azure CLI'
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Download a Build Artifact
      uses: actions/download-artifact@v4
      with:
        # Artifact name
        name: 'mywebappbuildartifacts'
        # Destination path
        path: 'mywebappbuildartifacts'
   
    # Deploy to Azure Web apps
    - name: 'Run Azure webapp deploy action using Service Principal credentials'
      uses: azure/webapps-deploy@v2
      with: 
        app-name: 'ASE-537861' # Updated with your actual Web App name
        package: 'mywebappbuildartifacts' # This should be the path to the published artifact
        slot-name: 'production' # Assuming you are deploying to the production slot of your single web app for now

  deploy-QA:
    name: "Deploy To Azure QA env"

    runs-on: ubuntu-latest
    
    needs:
      - build-app
    
    environment:
      name: 'DEMO05_QA'
      url: 'https://mywebapp-actions-qa.azurewebsites.net'

    steps:
    - uses: actions/checkout@v4
      
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x
    
    - name: 'Login via Azure CLI'
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Download a Build Artifact
      uses: actions/download-artifact@v4
      with:
        name: 'mywebappbuildartifacts'
        path: 'mywebappbuildartifacts'

    - name: 'Run Azure webapp deploy action using Service Principal credentials'
      uses: azure/webapps-deploy@v2
      with: 
        app-name: 'ASE-537861' # Updated with your actual Web App name
        package: 'mywebappbuildartifacts'
        slot-name: 'production' # Assuming you are deploying to the production slot of your single web app for now

  deploy-PROD:
    name: "Deploy To Azure PROD env"

    runs-on: ubuntu-latest
    
    needs:
      - deploy-DEV # Assuming PROD depends on DEV for a simple sequential deployment
      - deploy-QA # Assuming PROD depends on QA as well
    
    environment:
      name: 'DEMO05_PROD'
      url: 'https://mywebapp-actions.azurewebsites.net'

    steps:
    - uses: actions/checkout@v4
      
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x
    
    - name: 'Login via Azure CLI'
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Download a Build Artifact
      uses: actions/download-artifact@v4
      with:
        name: 'mywebappbuildartifacts'
        path: 'mywebappbuildartifacts'
   
    - name: 'Run Azure webapp deploy action using Service Principal credentials'
      uses: azure/webapps-deploy@v2
      with: 
        app-name: 'ASE-537861' # Updated with your actual Web App name
        package: 'mywebappbuildartifacts'
        slot-name: 'production' # Assuming you are deploying to the production slot of your single web app for now
